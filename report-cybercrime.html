<body>

<!-- Google Tag Manager (noscript) -->
<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KMTRJ47B"
height="0"
width="0"
style="display:none;visibility:hidden"></iframe>

<header class="navbar">
<a href="index.html" class="logo-link">

  <img
    src="images/logo.png"
    alt="NCIC Logo"
    class="site-logo">

</a>
</header>

<section class="form-container">

<h1>Cybercrime Report</h1>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<p id="stepText">Step 1 of 4</p>

<form id="reportForm">

<!-- STEP 1 -->

<div class="step active">

<h2>Cybercrime Classification</h2>

<label for="cybercrimeType">
What type of cybercrime occurred?
</label>

<select id="cybercrimeType" required>

<option value="">Select</option>

<option>Account Compromise</option>
<option>Phishing</option>
<option>Malware</option>
<option>Ransomware</option>
<option>Unauthorized Access</option>
<option>Data Breach</option>
<option>Website Attack</option>
<option>Other</option>

</select>

</div>

<!-- STEP 2 -->

<div class="step">

<h2>Reporter Information</h2>

<input
id="firstName"
type="text"
placeholder="First Name"
required>

<input
id="lastName"
type="text"
placeholder="Last Name"
required>

<input
id="email"
type="email"
placeholder="Email Address"
required>

<input
id="phone"
type="tel"
placeholder="Phone Number">

</div>

<!-- STEP 3 -->

<div class="step">

<h2>Incident Information</h2>

<input
id="affectedSystem"
type="text"
placeholder="Affected System / Account">

<input
id="incidentDate"
type="date">

<input
id="knownAttacker"
type="text"
placeholder="Known Username, Email, or Alias (if known)">

</div>

<!-- STEP 4 -->

<div class="step">

<h2>Incident Narrative</h2>

<textarea
id="narrative"
rows="8"
placeholder="Describe the cybercrime incident..."
required></textarea>

<label>
<input
id="accuracyDeclaration"
type="checkbox"
required>

I certify that the information provided is accurate.
</label>

<br><br>

<label>
<input
id="investigationAcknowledgement"
type="checkbox"
required>

I understand that submission does not guarantee investigation.
</label>

</div>

<div class="buttons">

<button type="button" id="prevBtn">
Previous
</button>

<button type="button" id="nextBtn">
Next
</button>

</div>

</form>

</section>

<script src="report.js"></script>

</body>
</html>
